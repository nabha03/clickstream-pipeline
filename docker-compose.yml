version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.1
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://sparkuser:sparkpass@postgres/airflow_db
    AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "clickstream_secret"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./producer.py:/opt/airflow/scripts/producer.py
    - ./logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    - postgres

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: sparkuser
      POSTGRES_PASSWORD: sparkpass
      POSTGRES_DB: clickstream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-airflow-db.sql:/docker-entrypoint-initdb.d/init-airflow-db.sql   # ← ADDED

  spark-submit:
    image: apache/spark:3.5.1
    container_name: spark-submit
    restart: on-failure
    depends_on:
      - kafka
      - postgres
    environment:
      - SPARK_HOME=/opt/spark
    volumes:
      - ./spark_consumer.py:/opt/spark/work-dir/spark_consumer.py
      - ./jars:/opt/spark/extra-jars
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        /opt/spark/bin/spark-submit \
          --master local[*] \
          --jars /opt/spark/extra-jars/spark-sql-kafka-0-10_2.12-3.5.1.jar,/opt/spark/extra-jars/kafka-clients-3.4.1.jar,/opt/spark/extra-jars/spark-token-provider-kafka-0-10_2.12-3.5.1.jar,/opt/spark/extra-jars/commons-pool2-2.11.1.jar,/opt/spark/extra-jars/postgresql-42.6.0.jar \
          --conf spark.driver.host=spark-submit \
          --conf spark.driver.bindAddress=0.0.0.0 \
          /opt/spark/work-dir/spark_consumer.py

  streamlit:
    image: python:3.11-slim
    container_name: streamlit
    depends_on:
      - postgres
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard.py:/app/dashboard.py
    working_dir: /app
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install streamlit psycopg2-binary pandas plotly --quiet
        streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0

  # ── Airflow (NEW) ────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        pip install psycopg2-binary --quiet
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Nabha --lastname K \
          --role Admin --email nabhakawadapure0308@gmail.com
    restart: "no"

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    restart: always
    depends_on:
      - airflow-init

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - airflow-init

volumes:
  postgres_data: